<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Daftar Smart Exam</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body{
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900">

  <section class="min-h-screen flex items-center justify-center px-4 py-6">

    <div class="w-full max-w-md rounded-[26px] border border-slate-200 bg-white p-5 shadow-xl shadow-slate-100">

      <!-- HEADER -->
      <div class="mb-5 text-center">

        <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-slate-800 shadow-lg shadow-indigo-500/20">
          <span class="text-xl font-bold text-white">S</span>
        </div>

        <h1 class="mt-3 text-2xl font-bold tracking-tight text-slate-900">
          Daftar Smart Exam
        </h1>

        <p class="mt-1 text-sm text-slate-500">
          Buat akun sekolah untuk mulai menggunakan Smart Exam.
        </p>
      </div>

      <!-- FORM -->
      <div class="space-y-2.5">

        <!-- SCHOOL -->
        <div>
          <label class="text-[13px] font-medium text-slate-600">
            Nama Sekolah
          </label>

          <input
            id="schoolName"
            type="text"
            placeholder="SMP Bina Cendekia"
            class="mt-1 w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm outline-none transition-all focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"
          />
        </div>

        <!-- NPSN -->
        <div>
          <label class="text-[13px] font-medium text-slate-600">
            NPSN
          </label>

          <input
            id="npsn"
            type="text"
            placeholder="20532145"
            class="mt-1 w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm outline-none transition-all focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"
          />
        </div>

        <!-- OPERATOR -->
        <div>
          <label class="text-[13px] font-medium text-slate-600">
            Nama Operator
          </label>

          <input
            id="operatorName"
            type="text"
            placeholder="Steven"
            class="mt-1 w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm outline-none transition-all focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"
          />
        </div>

        <!-- WHATSAPP -->
        <div>
          <label class="text-[13px] font-medium text-slate-600">
            Nomor WhatsApp
          </label>

          <input
            id="whatsapp"
            type="text"
            placeholder="081234567890"
            class="mt-1 w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm outline-none transition-all focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"
          />
        </div>

        <!-- EMAIL -->
        <div>
          <label class="text-[13px] font-medium text-slate-600">
            Email Admin
          </label>

          <input
            id="email"
            type="email"
            placeholder="admin@school.sch.id"
            class="mt-1 w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm outline-none transition-all focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"
          />
        </div>

        <!-- PASSWORD -->
        <div>
          <label class="text-[13px] font-medium text-slate-600">
            Password
          </label>

          <input
            id="password"
            type="password"
            placeholder="••••••••"
            class="mt-1 w-full rounded-xl border border-slate-200 px-3.5 py-2.5 text-sm outline-none transition-all focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100"
          />
        </div>

        <!-- BUTTON -->
        <button
          onclick="registerSchool()"
          id="registerBtn"
          class="mt-3 w-full rounded-xl bg-slate-900 py-2.5 text-sm font-medium text-white transition-all hover:bg-slate-800"
        >
          Daftar Sekarang
        </button>

      </div>

      <!-- LOGIN -->
      <div class="mt-4 text-center">

        <p class="text-sm text-slate-500">
          Sudah punya akun?
        </p>

        <a
          href="index.html"
          class="mt-1 inline-block text-sm font-semibold text-indigo-600 transition-colors hover:text-indigo-700"
        >
          Login Admin
        </a>
      </div>

      <!-- STATUS -->
      <div
        id="statusBox"
        class="hidden mt-4 rounded-xl px-4 py-3 text-sm"
      ></div>

    </div>

  </section>

  <script>

  // SUPABASE
  const supabaseUrl = 'https://xsnrezswlnqppmnlaxra.supabase.co';

  const supabaseKey = 'sb_publishable_uvD4WniOKy9KwbZQ_php1w_qqSAGvoF';

  const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
  );

  // REGISTER
  async function registerSchool() {

    const btn = document.getElementById('registerBtn');

    btn.innerText = 'Mendaftarkan...';
    btn.disabled = true;

    const schoolName = document.getElementById('schoolName').value.trim();
    const npsn = document.getElementById('npsn').value.trim();
    const operatorName = document.getElementById('operatorName').value.trim();
    const whatsapp = document.getElementById('whatsapp').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    const statusBox = document.getElementById('statusBox');

    try {

      // VALIDASI SEDERHANA
      if (
        !schoolName ||
        !npsn ||
        !operatorName ||
        !whatsapp ||
        !email ||
        !password
      ) {
        throw new Error('Semua field wajib diisi.');
      }

      // CEK NPSN SUDAH ADA ATAU BELUM
      const { data: existingSchool } = await supabaseClient
        .from('schools')
        .select('npsn')
        .eq('npsn', npsn)
        .maybeSingle();

      if (existingSchool) {
        throw new Error('NPSN sudah terdaftar.');
      }

      // INSERT SCHOOL
      const { error: schoolError } = await supabaseClient
        .from('schools')
        .insert([
          {
            npsn: npsn,
            school_name: schoolName,
            operator_name: operatorName,
            whatsapp_number: whatsapp,
            email: email,
            plan_type: 'FREE'
          }
        ]);

      if (schoolError) {
        throw schoolError;
      }

      // INSERT USER
      const { error: userError } = await supabaseClient
        .from('users')
        .insert([
          {
            school_npsn: npsn,
            full_name: operatorName,
            email: email,
            role: 'ADMIN'
          }
        ]);

      if (userError) {
        throw userError;
      }

      // SUCCESS
      statusBox.className =
        'mt-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700';

      statusBox.innerHTML =
        'Pendaftaran berhasil. Data sekolah sudah tersimpan.';

      statusBox.classList.remove('hidden');

      // RESET FORM
      document.getElementById('schoolName').value = '';
      document.getElementById('npsn').value = '';
      document.getElementById('operatorName').value = '';
      document.getElementById('whatsapp').value = '';
      document.getElementById('email').value = '';
      document.getElementById('password').value = '';

    } catch (err) {

      statusBox.className =
        'mt-4 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700';

      statusBox.innerHTML = err.message;

      statusBox.classList.remove('hidden');
    }

    btn.innerText = 'Daftar Sekarang';
    btn.disabled = false;
  }

</script>

</body>
</html>
