<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>
    Live Session • Smart Exam
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-slate-50 text-slate-700">

  <div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-72 border-r border-slate-200 bg-white">

      <div class="p-6">

        <div class="flex items-center gap-3">

          <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-indigo-600 text-lg font-black text-white">
            SE
          </div>

          <div>

            <h1 class="text-sm font-bold text-slate-800">
              Smart Exam
            </h1>

            <p class="text-xs text-slate-400">
              Live Monitoring
            </p>

          </div>

        </div>

      </div>

      <nav class="space-y-1 px-4">

        <a
          href="dashboard.html"
          class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-100">

          <i data-lucide="layout-dashboard" class="h-4 w-4"></i>

          Dashboard

        </a>

        <a
          href="students.html"
          class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-500 hover:bg-slate-100">

          <i data-lucide="users" class="h-4 w-4"></i>

          Data Siswa

        </a>

        <a
          href="#"
          class="flex items-center gap-3 rounded-xl bg-indigo-50 px-4 py-3 text-sm font-semibold text-indigo-600">

          <i data-lucide="monitor-smartphone" class="h-4 w-4"></i>

          Live Session

        </a>

      </nav>

    </aside>

    <!-- CONTENT -->
    <main class="flex-1 p-8">

      <!-- HEADER -->
      <div class="mb-8 flex items-center justify-between">

        <div>

          <h1 class="text-2xl font-black text-slate-800">
            Live Session Monitoring
          </h1>

          <p class="mt-1 text-sm text-slate-400">
            Monitoring aktivitas peserta ujian secara realtime
          </p>

        </div>

        <button

          onclick="deleteAllSessions()"

          class="rounded-xl bg-red-600 px-5 py-3 text-sm font-semibold text-white transition-all hover:bg-red-700">

          Reset Semua Session

        </button>

      </div>

      <!-- FILTER -->
      <div class="mb-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">

        <div class="grid grid-cols-1 gap-4 md:grid-cols-4">

          <!-- SEARCH -->
          <input
            id="searchInput"
            type="text"
            placeholder="Cari nama siswa..."
            class="rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-indigo-500">

          <!-- FILTER KELAS -->
          <select
            id="classFilter"
            class="rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-indigo-500">

            <option value="">
              Semua Kelas
            </option>

          </select>

          <!-- FILTER RUANG -->
          <select
            id="roomFilter"
            class="rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-indigo-500">

            <option value="">
              Semua Ruang
            </option>

          </select>

          <!-- STATUS -->
          <div class="flex items-center justify-end">

            <div class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-4 py-2 text-xs font-bold text-emerald-600">

              <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>

              Realtime Active

            </div>

          </div>

        </div>

      </div>

      <!-- TABLE -->
      <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">

        <div class="overflow-x-auto">

          <table class="min-w-full">

            <thead class="bg-slate-50">

              <tr class="border-b border-slate-200">

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Nama Siswa
                </th>

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Fullscreen
                </th>

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Pelanggaran
                </th>

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Device
                </th>

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Last Seen
                </th>

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Status
                </th>

                <th class="px-5 py-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                  Aksi
                </th>

              </tr>

            </thead>

            <tbody
              id="sessionTable"
              class="divide-y divide-slate-100">

            </tbody>

          </table>

        </div>

      </div>

    </main>

  </div>

  <!-- SCRIPT -->
  <script src="js/api.js"></script>
  <script src="js/live-session.js"></script>

  <script>

    lucide.createIcons();

  </script>

</body>

</html>
